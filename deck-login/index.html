<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protected deck</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #111;
            color: #f3f3f3;
            font-family: 'IBM Plex Sans', system-ui, sans-serif;
        }

        main {
            width: min(92vw, 420px);
            padding: 2rem;
            border: 1px solid #333;
            border-radius: 12px;
            background: #181818;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin: 0 0 0.75rem;
            font-size: 1.5rem;
        }

        p {
            margin: 0 0 1rem;
            color: #bbb;
            line-height: 1.5;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 0.8rem 0.9rem;
            border-radius: 8px;
            border: 1px solid #444;
            background: #0f0f0f;
            color: #fff;
            box-sizing: border-box;
        }

        button {
            margin-top: 0.9rem;
            width: 100%;
            padding: 0.8rem 0.9rem;
            border: 0;
            border-radius: 8px;
            background: #c44e52;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <main>
        <h1 id="title">Protected deck</h1>
        <p>Enter the password to open this presentation.</p>
        <form id="loginForm" method="get" action="/">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="off" autofocus>
            <button type="submit">Open deck</button>
        </form>
    </main>
    <script>
        const params = new URLSearchParams(window.location.search);
        const next = params.get('next');
        const title = params.get('title');
        const form = document.getElementById('loginForm');
        const titleElement = document.getElementById('title');

        if (title) {
            titleElement.textContent = title;
            document.title = title;
        }

        if (next && next.startsWith('/')) {
            form.action = next;
        }
    </script>
</body>
</html>
